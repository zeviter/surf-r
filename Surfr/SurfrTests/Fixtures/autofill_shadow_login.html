<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Sign in</title></head>
<body>
  <h1>Sign in</h1>
  <!-- A web-component login popup: BOTH fields live inside an OPEN shadow root. Light-DOM
       querySelectorAll would miss them entirely; with shadow-piercing detection this must be seen as a
       single-page login (password present), NOT username-first. -->
  <login-popup></login-popup>
  <script>
    const host = document.querySelector("login-popup");
    const root = host.attachShadow({ mode: "open" });
    root.innerHTML =
      '<form>' +
      '<input id="suser" type="text" autocomplete="username">' +
      '<input id="spass" type="password">' +
      '<button type="submit">Sign in</button>' +
      '</form>';
  </script>
</body>
</html>
