<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sign in</title></head>
<body>
  <h1>Sign in</h1>
  <!-- Two-step page 2 / non-login password: a single password field, NO username. Must not capture
       (it can't be deduped → would spuriously re-offer the just-filled credential). -->
  <form action="/ap/signin" onsubmit="return false">
    <input id="p" type="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</body></html>
