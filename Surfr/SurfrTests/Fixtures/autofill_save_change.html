<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Change password</title></head>
<body>
  <h1>Change password</h1>
  <!-- Three password fields (current + new + confirm): a change form, NOT a login. Must not capture. -->
  <form action="/account/change-password" onsubmit="return false">
    <input id="cur" type="password" autocomplete="current-password">
    <input id="new" type="password" autocomplete="new-password">
    <input id="confirm" type="password" autocomplete="new-password">
    <button type="submit">Change password</button>
  </form>
</body></html>
