<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Sign in</title></head>
<body>
  <h1>Sign in</h1>
  <!-- Two-step page 1: username only (STRONG signal: autocomplete=username), no password field. -->
  <form action="/ap/signin">
    <input id="email" type="email" autocomplete="username" name="email" placeholder="Email or mobile number">
    <button type="submit">Continue</button>
  </form>
</body>
</html>
