<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Create account</title></head>
<body>
  <h1>Create your account</h1>
  <!-- Signup: email + password + confirm (2 visible passwords). Must not capture. -->
  <form action="/signup" onsubmit="return false">
    <input id="u" type="email" autocomplete="username">
    <input id="p" type="password" autocomplete="new-password">
    <input id="confirm" type="password" autocomplete="new-password">
    <button type="submit">Sign up</button>
  </form>
</body></html>
