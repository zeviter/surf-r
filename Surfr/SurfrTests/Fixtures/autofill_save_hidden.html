<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sign in</title></head>
<body>
  <h1>Sign in</h1>
  <!-- The only password field is hidden (a trap). Must not capture. -->
  <form action="/login" onsubmit="return false">
    <input id="u" type="text" autocomplete="username">
    <input id="p" type="password" style="display:none">
    <button type="submit">Sign in</button>
  </form>
</body></html>
